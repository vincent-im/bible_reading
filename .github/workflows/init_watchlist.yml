name: Initialize Watchlist Prices

on:
  workflow_dispatch:

jobs:
  init:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch current prices
        run: python setup_prices.py

      - name: Commit updated watchlist
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add watchlist.json
          git diff --staged --quiet && echo "변경 없음" || \
            (git commit -m "chore: update watchlist with current prices" && git push)
