name: Test Telegram Connection

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['.github/workflows/test_telegram.yml']

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Send test message
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 - <<'EOF'
          import os, requests, sys
          token = os.environ.get("TELEGRAM_BOT_TOKEN", "")
          chat_id = os.environ.get("TELEGRAM_CHAT_ID", "")
          if not token or not chat_id:
              print("TELEGRAM_BOT_TOKEN 또는 TELEGRAM_CHAT_ID가 설정되지 않았습니다.")
              sys.exit(1)
          resp = requests.post(
              f"https://api.telegram.org/bot{token}/sendMessage",
              json={
                  "chat_id": chat_id,
                  "parse_mode": "HTML",
                  "text": (
                      "🔴 <b>[매도 시그널 테스트] SK텔레콤 (017670.KS)</b>\n"
                      "━━━━━━━━━━━━━━━━━━\n"
                      "📊 1단계: 당일 변동 -6.30%\n"
                      "📌 2단계: STOP_LOSS\n"
                      "📋 내용: 손절가 도달: 매수가 62,000 → 현재가 55,800 (-10.00%)\n"
                      "━━━━━━━━━━━━━━━━━━\n"
                      "💰 매수가: 62,000.00\n"
                      "💹 현재가: 55,800.00 (-10.00%)\n"
                      "🕐 시각: 테스트 메시지"
                  )
              },
              timeout=10
          )
          data = resp.json()
          if data.get("ok"):
              print("텔레그램 전송 성공!")
          else:
              print(f"전송 실패: {data}")
              sys.exit(1)
          EOF
