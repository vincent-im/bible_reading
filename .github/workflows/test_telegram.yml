name: Test Telegram Connection

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['.github/workflows/test_telegram.yml']

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Send test message
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 - <<'EOF'
          import os, requests, sys
          token = os.environ.get("TELEGRAM_BOT_TOKEN", "")
          chat_id = os.environ.get("TELEGRAM_CHAT_ID", "")
          if not token or not chat_id:
              print("TELEGRAM_BOT_TOKEN 또는 TELEGRAM_CHAT_ID가 설정되지 않았습니다.")
              sys.exit(1)
          resp = requests.post(
              f"https://api.telegram.org/bot{token}/sendMessage",
              json={"chat_id": chat_id, "text": "✅ 테스트 메시지 (2차)\n\n주식 매도 알림 봇 정상 작동 중입니다.\n손절 -10% / 목표 +100% 기준으로 9개 종목을 모니터링합니다."},
              timeout=10
          )
          data = resp.json()
          if data.get("ok"):
              print("텔레그램 전송 성공!")
          else:
              print(f"전송 실패: {data}")
              sys.exit(1)
          EOF
