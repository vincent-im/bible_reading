name: Test Telegram Connection

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['.github/workflows/test_telegram.yml']

jobs:
  etf-data-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: ETF data diagnostics
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 - <<'PYEOF'
          import os, requests, sys, traceback
          from datetime import datetime, timedelta

          token = os.environ["TELEGRAM_BOT_TOKEN"]
          chat_id = os.environ["TELEGRAM_CHAT_ID"]

          def send(text):
              requests.post(
                  f"https://api.telegram.org/bot{token}/sendMessage",
                  json={"chat_id": chat_id, "parse_mode": "HTML", "text": text},
                  timeout=10
              )

          from pykrx import stock

          def last_weekday(dt):
              while dt.weekday() >= 5:
                  dt -= timedelta(days=1)
              return dt

          def recent_trading_days(n):
              days, dt = [], datetime.now()
              while len(days) < n:
                  if dt.weekday() < 5:
                      days.append(dt.strftime("%Y%m%d"))
                  dt -= timedelta(days=1)
              return days

          now = datetime.now()

          # ─── 당일 날짜 ───
          td = recent_trading_days(2)
          today_str, prev_str = td[0], td[1]

          # ─── 주간 날짜 ───
          days_since_fri = (now.weekday() - 4) % 7
          this_fri = last_weekday(now - timedelta(days=days_since_fri))
          last_fri = last_weekday(this_fri - timedelta(days=7))
          this_fri_str = this_fri.strftime("%Y%m%d")
          last_fri_str = last_fri.strftime("%Y%m%d")

          # ─── 월간 날짜 ───
          first_this = now.replace(day=1)
          last_prev = first_this - timedelta(days=1)
          first_prev = last_prev.replace(day=1)
          last_prev_prev = first_prev - timedelta(days=1)
          end_dt = last_weekday(last_prev)
          start_dt = last_weekday(last_prev_prev)
          end_str = end_dt.strftime("%Y%m%d")
          start_str = start_dt.strftime("%Y%m%d")

          # ─── 데이터 조회 ───
          results = {}
          for label, d1, d2 in [
              ("당일",  today_str,    prev_str),
              ("주간",  this_fri_str, last_fri_str),
              ("월간",  end_str,      start_str),
          ]:
              try:
                  df1 = stock.get_etf_ohlcv_by_ticker(d1)
                  df2 = stock.get_etf_ohlcv_by_ticker(d2)
                  results[label] = (d1, d2, len(df1), len(df2), df1, df2)
              except Exception as e:
                  results[label] = (d1, d2, -1, -1, None, None)

          # ─── 진단 메시지 ───
          lines = ["<b>🔍 ETF 데이터 수신 진단</b>", "━━━━━━━━━━━━━━━━━━"]
          for label, (d1, d2, n1, n2, df1, df2) in results.items():
              ok = n1 > 0 and n2 > 0
              icon = "✅" if ok else "⚠️"
              lines.append(f"{icon} <b>{label}</b>")
              lines.append(f"  기준: {d1} / 비교: {d2}")
              lines.append(f"  종목수: {n1}개 / {n2}개")
              if ok:
                  # 수익률 상위 3개 샘플
                  common = df1.index.intersection(df2.index)
                  c1 = df1.loc[common, '종가']
                  c2 = df2.loc[common, '종가']
                  valid = c2[c2 > 0]
                  common = valid.index.intersection(c1.index)
                  rets = (c1[common] - valid[common]) / valid[common] * 100
                  top3 = rets.sort_values(ascending=False).head(3)
                  sample = ", ".join(f"{v:+.1f}%" for v in top3.values)
                  lines.append(f"  상위3 수익률: {sample}")
              lines.append("")

          lines.append("━━━━━━━━━━━━━━━━━━")
          lines.append(f"조회시각: {now.strftime('%Y-%m-%d %H:%M')} UTC")
          send("\n".join(lines))
          print("진단 완료")
          PYEOF
